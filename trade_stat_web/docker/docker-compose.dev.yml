version: "3.5"
services:
  ant-design-pro_build:
    build: ../
#    container_name: "ant-design-pro_build"
    volumes:
      - dist:/usr/src/app/dist
  ant-design-pro_web:
    image: nginx
    ports:
      - 80:80
    container_name: "ant-design-pro_web"
    restart: unless-stopped
    volumes:
      - dist:/usr/share/Nginx/HTML:ro
      - ./Nginx.conf:/etc/Nginx/conf.d/default.conf
volumes:
  dist:
