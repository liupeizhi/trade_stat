version: '3.8'

services:
  # 数据库服务
  trade_stat_db:
    image: mysql:8.0
    container_name: trade_stat_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: trade_memo
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    command: --default-authentication-plugin=mysql_native_password --bind-address=0.0.0.0
    ports:
      - "18887:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./trade_stat_api/sql/init:/docker-entrypoint-initdb.d
    networks:
      trade_stat_network:
        aliases:
          - trade_stat_db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API 服务
  trade_stat_api:
    build:
      context: ./trade_stat_api
      dockerfile: Dockerfile
    container_name: trade_stat_api
    restart: unless-stopped
    ports:
      - "18888:8080"
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      trade_stat_db:
        condition: service_healthy
    networks:
      - trade_stat_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Web 服务
  trade_stat_web:
    build:
      context: ./trade_stat_web
      dockerfile: Dockerfile
    container_name: trade_stat_web
    restart: unless-stopped
    ports:
      - "18889:80"
    depends_on:
      - trade_stat_api
    networks:
      - trade_stat_network
    volumes:
      - ./trade_stat_web/nginx.conf:/etc/nginx/conf.d/default.conf:ro

networks:
  trade_stat_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
